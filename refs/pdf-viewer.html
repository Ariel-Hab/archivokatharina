<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><style>html,body{margin:0;background:#222}canvas{display:block;max-width:100vw;max-height:100vh;margin:0 auto}</style></head>
<body>
<img id="im" style="display:block;margin:0">
<canvas id="c" style="display:none"></canvas>
<script type="module">
import * as pdfjs from 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.min.mjs';
pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdn.jsdelivr.net/npm/pdfjs-dist@4.10.38/build/pdf.worker.min.mjs';
const docs = {};
let chain = Promise.resolve();
window.showPage = (file, n, scale=2) => {
  window.__ready = false;
  chain = chain.catch(()=>{}).then(async () => {
    if (!docs[file]) {
      const buf = await (await fetch('../uploads/' + file)).arrayBuffer();
      docs[file] = await pdfjs.getDocument({ data: new Uint8Array(buf) }).promise;
    }
    const page = await docs[file].getPage(n);
    const vp = page.getViewport({ scale });
    const off = document.createElement('canvas');
    off.width = Math.round(vp.width); off.height = Math.round(vp.height);
    await page.render({ canvasContext: off.getContext('2d'), viewport: vp }).promise;
    const c = document.getElementById('c');
    c.width = off.width; c.height = off.height;
    c.getContext('2d').drawImage(off, 0, 0);
    const im = document.getElementById('im');
    im.style.cssText = 'display:block;margin:0 auto;max-width:100vw;max-height:100vh';
    im.src = off.toDataURL('image/png');
    await new Promise(res => { im.onload = res; });
    window.__ready = true;
    return [off.width, off.height];
  });
  return chain;
};
window.showCrop = async (file, n, fx, fy, fw, fh, outW) => {
  window.__ready = false;
  if (!docs[file]) {
    const buf = await (await fetch('../uploads/' + file)).arrayBuffer();
    docs[file] = await pdfjs.getDocument({ data: new Uint8Array(buf) }).promise;
  }
  const page = await docs[file].getPage(n);
  const base = page.getViewport({ scale: 1 });
  const scale = outW / (base.width * fw);
  const vp = page.getViewport({ scale });
  const off = document.createElement('canvas');
  off.width = Math.round(vp.width); off.height = Math.round(vp.height);
  await page.render({ canvasContext: off.getContext('2d'), viewport: vp }).promise;
  const sx = Math.round(vp.width * fx), sy = Math.round(vp.height * fy);
  const sw = Math.round(vp.width * fw), sh = Math.round(vp.height * fh);
  const crop = document.createElement('canvas');
  crop.width = sw; crop.height = sh;
  crop.getContext('2d').drawImage(off, sx, sy, sw, sh, 0, 0, sw, sh);
  const im = document.getElementById('im');
  im.style.cssText = 'display:block;position:absolute;top:0;left:0;width:' + sw + 'px;height:' + sh + 'px;max-width:none;max-height:none;margin:0';
  document.body.style.margin = '0';
  im.src = crop.toDataURL('image/png');
  await new Promise(res => { im.onload = res; });
  window.__cropDims = [sw, sh];
  window.__ready = true;
  return [sw, sh];
};
window.__ready = true;
</script>
</body>
</html>
